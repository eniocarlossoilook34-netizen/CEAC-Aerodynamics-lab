<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEAC-Lab | Aerodinâmica</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="app">
        <header>
            <h1>Laboratório Full-Stack: Aerodinâmica</h1>
            <p>Integração Python (Back-end) & JS (Front-end)</p>
        </header>

        <div class="input-group">
            <label>Velocidade (U): <span id="val-v">10</span> m/s</label>
            <input type="range" id="velocity" min="1" max="100" value="10">
        </div>

        <div class="input-group">
            <label>Ângulo de Ataque (α): <span id="val-aoa">0</span> °</label>
            <input type="range" id="aoa" min="-20" max="20" value="0">
        </div>

        <div class="button-group">
            <button id="run-simulation">Executar Simulação CFD</button>
            <button id="reset-data">Reiniciar Painel</button>
        </div>

        <div id="visualizer">
            <div class="telemetry-grid">
                <div class="telemetry-card">
                    <small>REYNOLDS (Re)</small>
                    <div id="stat-re">0</div>
                </div>
                <div class="telemetry-card">
                    <small>SUSTENTAÇÃO (Cl)</small>
                    <div id="stat-cl">0.00</div>
                </div>
            </div>
            
            <div style="height: 120px; margin-bottom: 15px;">
                <canvas id="performanceChart"></canvas>
            </div>

            <div id="canvas-container"></div>
            <div id="status-display">[00:00:00] Sistema pronto para testes.</div>
        </div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
